version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: src/AdaptiveMind.API/Dockerfile
    ports:
      - "5001:5000"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:5000
    volumes:
      - ./data:/app/data
    depends_on:
      - postgres

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: adaptivemind
      POSTGRES_PASSWORD: devpassword123
      POSTGRES_DB: adaptivemind
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adaptivemind"]
      interval: 10s
      timeout: 5s
      retries: 5

  web-ui:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./demo:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api

volumes:
  postgres_data:
